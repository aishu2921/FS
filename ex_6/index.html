<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Mark Analyzer - Advanced</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Student Mark Analyzer</h1>

    <!-- Step 1: Set Student Name -->
    <div class="setup-section">
        <input type="text" id="studentName" placeholder="Enter Student Name">
        <button id="startBtn">Set Student</button>
    </div>

    <!-- Step 2: Enter Subject & Marks -->
    <div id="markEntrySection" style="display:none; margin-top: 20px;">
        <h3>Student: <span id="displayName"></span></h3>
        <div class="controls">
            <input type="text" id="subjectName" placeholder="Subject Name">
            <input type="number" id="markInput" placeholder="Mark (0-100)">
            <button id="addBtn">Add Subject</button>
            <button id="resetBtn">Finish & Reset</button>
        </div>
    </div>

    <div id="results"></div>

    <script src="script.js"></script>
</body>
</html>
