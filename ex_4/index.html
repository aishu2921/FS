<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <title>Color Changer App</title> 
    <link rel="stylesheet" href="style.css"> 
</head> 
<body> 
 
    <h1>DOM-Based Color Changer</h1> 
    <h3 id="colorDisplay">Current Color: Default (White)</h3>
 
    <div class="button-container"> 
        <button id="redBtn" class="color-btn">Red</button> 
        <button id="greenBtn" class="color-btn">Green</button> 
        <button id="blueBtn" class="color-btn">Blue</button> 
    </div> 

    <div class="custom-input">
        <input type="text" id="customColorInput" placeholder="Enter color (e.g. #ff5500)">
        <button id="applyBtn">Apply Custom</button>
    </div>

    <button id="resetBtn">Reset</button> 
 
    <script src="script.js"></script> 
</body> 
</html>
